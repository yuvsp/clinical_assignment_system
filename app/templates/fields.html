{% extends "base.html" %}

{% block content %}
<h1 class="mb-4 text-right">תחומים</h1>

<!-- Buttons for download, upload, and add -->
<div class="d-flex flex-wrap gap-2 align-items-center mb-3">
    <a href="{{ url_for('main.add_field') }}" class="btn btn-success">הוסף תחום חדש</a>
    <a href="{{ url_for('main.download_fields') }}" class="btn btn-success">הורד קובץ אקסל</a>
    <form action="{{ url_for('main.upload_fields') }}" method="post" enctype="multipart/form-data" class="d-inline">
        <span class="upload-one-btn">
            <button type="button" class="btn btn-success">ייבא רשומות תחומים</button>
            <input type="file" class="upload-file-overlay" name="file" required onchange="this.form.submit()">
        </span>
    </form>
</div>

<!-- Table to display fields -->
<table class="table table-bordered mt-4" dir="rtl">
    <thead>
        <tr>
            <th class="text-right">שם</th>
            <th class="text-right" style="width: 50px;">צבע</th>
        </tr>
    </thead>
    <tbody>
        {% for field in fields %}
        <tr>
            <td class="text-right">{{ field.name }}</td>
            <td class="text-right" style="background-color: {{ field.color }}">{{ field.color }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
